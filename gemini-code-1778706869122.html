<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games4All | Gaming Hub</title>
    <style>
        :root {
            --bg-dark: #12081f;
            --bg-lighter: #2d134d;
            --accent-purple: #9d4edd;
            --accent-hover: #7b2cbf;
            --text-white: #ffffff;
            --text-gray: #b1a7c1;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
        }

        /* Navigation & Search */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(18, 8, 31, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-left { display: flex; align-items: center; gap: 30px; }
        .logo { font-size: 1.4rem; font-weight: 800; cursor: pointer; color: var(--accent-purple); }

        .search-container {
            position: relative;
            flex-grow: 1;
            max-width: 400px;
            margin: 0 20px;
        }

        .search-bar {
            width: 100%;
            background: var(--bg-lighter);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .btn-login {
            background: transparent;
            border: 1px solid var(--accent-purple);
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover { background: var(--accent-purple); }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--bg-lighter);
            padding: 40px;
            border-radius: 15px;
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            background: var(--bg-dark);
            color: white;
        }

        /* Hero & Grid (Same as before but refined) */
        .hero {
            height: 400px;
            background: linear-gradient(rgba(18,8,31,0.2), var(--bg-dark)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            display: flex;
            align-items: center;
            padding: 0 5%;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 2rem 5%;
        }

        .game-card {
            background: var(--bg-lighter);
            border-radius: 12px;
            padding-bottom: 15px;
            overflow: hidden;
        }

        .game-card img { width: 100%; height: 150px; object-fit: cover; }
        .card-details { padding: 15px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="logo">🎮 Games4All</div>
        <div class="nav-links">
            <a href="#" style="color:white; text-decoration:none; margin-right:15px;">Home</a>
            <a href="#" style="color:var(--text-gray); text-decoration:none;">Community</a>
        </div>
    </div>
    
    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search games...">
    </div>

    <button class="btn-login" onclick="toggleModal()">Login</button>
</nav>

<header class="hero">
    <div class="hero-content">
        <h1 style="font-size: 3rem; margin: 0;">Tomodachi Life</h1>
        <p style="color: var(--text-gray);">Join millions of players in the ultimate sandbox experience.</p>
        <button style="background: var(--accent-purple); color: white; border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; cursor: pointer;">Play Now</button>
    </div>
</header>

<div class="game-grid">
    <!-- Card 1 -->
    <div class="game-card">
        <img src="https://via.placeholder.com/300x150/9d4edd/ffffff?text=ARK:+Survival" alt="ARK">
        <div class="card-details">
            <h3>ARK: Survival</h3>
            <p style="font-size: 0.8rem; color: var(--text-gray);">Survival • ⭐ 4.5</p>
            <button style="width:100%; padding: 8px; background: var(--bg-dark); border: 1px solid var(--accent-purple); color: white; border-radius: 5px; cursor:pointer;">Launch</button>
        </div>
    </div>
    <!-- Card 2 -->
    <div class="game-card">
        <img src="https://via.placeholder.com/300x150/2d134d/ffffff?text=Factorio" alt="Factorio">
        <div class="card-details">
            <h3>Factorio</h3>
            <p style="font-size: 0.8rem; color: var(--text-gray);">Automation • ⭐ 4.9</p>
            <button style="width:100%; padding: 8px; background: var(--bg-dark); border: 1px solid var(--accent-purple); color: white; border-radius: 5px; cursor:pointer;">Launch</button>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal" id="loginModal">
    <div class="modal-content">
        <h2>Welcome Back</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button onclick="toggleModal()" style="width:100%; padding: 12px; background: var(--accent-purple); color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">Sign In</button>
        <p style="font-size: 0.8rem; color: var(--text-gray); margin-top: 15px; cursor: pointer;" onclick="toggleModal()">Cancel</p>
    </div>
</div>

<script>
    function toggleModal() {
        const modal = document.getElementById('loginModal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
    }
</script>

</body>
</html>
